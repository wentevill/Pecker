name: Pecker

options:
  deploymentTarget:
    iOS: "26.0"

settings:
  base:
    SWIFT_VERSION: "6.0"

targets:
  PeckerCore:
    type: library.static
    platform: iOS
    sources:
      - path: Sources/PeckerCore

  Pecker:
    type: application
    platform: iOS
    sources:
      - path: Pecker/App
      - path: Pecker/Activity
      - path: Pecker/Design
      - path: Pecker/EventKit
      - path: Pecker/Recognition
      - path: Pecker/Features/Onboarding
      - path: Pecker/Features/Shared
      - path: Pecker/Features/Today
      - path: Pecker/Features/Detail
      - path: Pecker/Features/Settings
      - path: Pecker/Features/Timeline
      - path: Pecker/Persistence
      - path: Shared
      - path: Pecker/Resources
        buildPhase: resources
        excludes:
          - Info.plist
          - Pecker.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wenttang.pecker
        PRODUCT_NAME: Pecker
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Pecker/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Pecker/Resources/Pecker.entitlements
        DEVELOPMENT_TEAM: LNQGSLWW24
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: Apple Development
        PROVISIONING_PROFILE_SPECIFIER: ""
    dependencies:
      - target: PeckerCore
      - target: PeckerLiveActivity
        embed: true

  PeckerLiveActivity:
    type: app-extension
    platform: iOS
    sources:
      - path: PeckerLiveActivity
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wenttang.pecker.liveactivity
        PRODUCT_NAME: PeckerLiveActivity
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: PeckerLiveActivity/Info.plist
        CODE_SIGN_ENTITLEMENTS: PeckerLiveActivity/PeckerLiveActivity.entitlements
        DEVELOPMENT_TEAM: LNQGSLWW24
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: Apple Development
        PROVISIONING_PROFILE_SPECIFIER: ""
        SKIP_INSTALL: YES
    dependencies:
      - target: PeckerCore

  PeckerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PeckerTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wenttang.PeckerTests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Pecker

  PeckerCoreTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/PeckerCoreTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wenttang.PeckerCoreTests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: PeckerCore

schemes:
  Pecker:
    shared: true
    build:
      targets:
        Pecker: all
        PeckerLiveActivity: all
        PeckerTests: [test]
        PeckerCoreTests: [test]
    test:
      targets:
        - PeckerTests
        - PeckerCoreTests
